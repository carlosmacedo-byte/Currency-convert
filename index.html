<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Câmbio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="img-one" src="./assets/currencyart.gif" alt="Câmbio">

    <main>

            <label>
                <p>Converter de</p>
                <select id="option-one">

                    <option value="real">R$ Real</option>
                    <option value="dolar">US$ Dólar</option>
                    <option value="euro">€ Euro</option>
                    <option value="libra">£ Libra</option>
                    <option value="bitcoin">₿ Bitcoin</option>

                    
                </select>
            </label>

            <label>
                <p>Converter para</p>
                <select id="option-two">

                    <option value="dolar">US$ Dólar</option>
                    <option value="real">R$ Real</option>
                    <option value="euro">€ Euro</option>
                    <option value="libra">£ Libra</option>
                    <option value="bitcoin">₿ Bitcoin</option>

                </select>
            </label>

            <label>
                <p>Valor</p>
                <input id="cash" type="number" step="0.01" placeholder="R$ 0,00">
            </label>

            <button id="convert">Converter</button>


            <section>
                <div>
                    <img id="currency-img-one" class="img-two" src="./assets/real.png" alt="Câmbio Brsileiro">
                    <p class="text-one" id="currency-name-one">Real</p>
                    <p class="value" id="to-convert">R$ 0,00</p>
                </div>
                <img class="img-three" src="./assets/setasifrao.png" alt="Indicador">
                <div>
                    <img id="currency-img-two" class="img-two" src="./assets/dolar.png" alt="Câmbio Estrangeiro">
                    <P class="text-one" id="currency-name-two">Dolar</P>
                    <p class="value" id="the-converted">US$ 0,00</p>
                </div>
            </section>

    </main>

    <img class="img-one" src="./assets/currencyart.gif" alt="Câmbio">
</body>
<script src="script.js"></script>
</html>
